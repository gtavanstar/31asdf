<!DOCTYPE html>
<html>
<head>
    <title>YOU ARE AN IDIOT!</title>
    <style>
        body { background: white; overflow: hidden; text-align: center; }
        h1 { font-size: 30px; margin-top: 50px; }
    </style>
</head>
<body onload="ziplat()" onbeforeunload="yenisiniAc()">
    <h1 id="text">YOU ARE AN IDIOT!</h1>
    <p>☺ ☺ ☺</p>

    <script>
        function ziplat() {
            // Pencereyi rastgele bir yere ışınla
            let x = Math.random() * (screen.width - 300);
            let y = Math.random() * (screen.height - 300);
            window.moveTo(x, y);
            
            // Renkleri değiştir (Göz yoran efekt)
            document.body.style.backgroundColor = document.body.style.backgroundColor == "black" ? "white" : "black";
            document.getElementById("text").style.color = document.body.style.backgroundColor == "black" ? "white" : "black";

            setTimeout(ziplat, 100);
        }

        function yenisiniAc() {
            // Eğer pencere kapatılmaya çalışılırsa yenisini açar
            window.open("idiot.html", "", "width=300,height=300");
        }
    </script>
</body>
</html>
